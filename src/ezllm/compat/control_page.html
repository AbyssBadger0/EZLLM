<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EZLLM Control</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #657080;
      --line: #d9dee7;
      --accent: #1463ff;
      --danger: #b42318;
      --ok: #087443;
      --shadow: 0 1px 2px rgba(15, 23, 42, .08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101317;
        --panel: #171b21;
        --text: #e7ebf0;
        --muted: #a5afbd;
        --line: #2a313b;
        --accent: #6ea1ff;
        --danger: #ff8a7a;
        --ok: #5ee0a0;
        --shadow: none;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px 24px 32px;
    }
    .toolbar, .status, form {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
    }
    .status {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 1px;
      margin: 16px 0;
      overflow: hidden;
    }
    .metric {
      padding: 12px;
      background: var(--panel);
      min-width: 0;
    }
    .metric b {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
    .metric span {
      display: block;
      margin-top: 3px;
      overflow-wrap: anywhere;
    }
    form {
      padding: 18px;
    }
    fieldset {
      border: 0;
      padding: 0;
      margin: 0 0 22px;
    }
    legend {
      padding: 0;
      margin-bottom: 12px;
      font-size: 15px;
      font-weight: 650;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    input, select, textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      padding: 8px 10px;
      font: inherit;
    }
    textarea {
      min-height: 84px;
      resize: vertical;
    }
    input:focus, select:focus, textarea:focus, button:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    button, a.button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-weight: 650;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    button.danger {
      border-color: var(--danger);
      color: var(--danger);
    }
    .compact {
      margin: 12px 0;
      box-shadow: none;
    }
    .path-control {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }
    .full {
      grid-column: 1 / -1;
    }
    .browser {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .browser[hidden] {
      display: none;
    }
    .browser-head, .browser-actions, .browser-entry {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .browser-head {
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .browser-title {
      font-weight: 650;
    }
    .browser-path {
      margin: 8px 0;
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    .browser-list {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }
    .browser-entry {
      justify-content: space-between;
      min-height: 40px;
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .browser-entry span {
      overflow-wrap: anywhere;
    }
    .empty {
      color: var(--muted);
      padding: 10px 0;
    }
    .message {
      min-height: 22px;
      margin-top: 12px;
      color: var(--muted);
    }
    .message.ok { color: var(--ok); }
    .message.err { color: var(--danger); }
  </style>
</head>
<body>
  <header>
    <h1>EZLLM Control</h1>
    <a class="button" href="/logs">Logs</a>
  </header>
  <main>
    <div class="toolbar" aria-label="runtime actions">
      <button type="button" onclick="refreshAll()">Refresh</button>
      <button type="button" onclick="saveConfig()" class="primary">Save</button>
      <button type="button" onclick="restartRuntime()">Restart</button>
      <button type="button" onclick="stopRuntime()" class="danger">Stop</button>
    </div>
    <section class="status" id="status"></section>
    <form id="config-form">
      <fieldset>
        <legend>Runtime</legend>
        <div class="grid">
          <label>Host <input name="runtime.host" autocomplete="off"></label>
          <label>Proxy Port <input name="runtime.proxy_port" type="number" min="1" max="65535"></label>
          <label>Llama Port <input name="runtime.llama_port" type="number" min="1" max="65535"></label>
        </div>
      </fieldset>
      <fieldset>
        <legend>Paths</legend>
        <div class="grid">
          <label>Server Bin <span class="path-control"><input name="llama.server_bin" autocomplete="off"><button type="button" onclick="openPathBrowser('llama.server_bin', 'llama')">Browse</button></span></label>
          <label>Model Path <span class="path-control"><input name="llama.model_path" autocomplete="off"><button type="button" onclick="openPathBrowser('llama.model_path', 'models')">Browse</button></span></label>
          <label>MMProj Path <span class="path-control"><input name="llama.mmproj_path" autocomplete="off"><button type="button" onclick="openPathBrowser('llama.mmproj_path', 'models')">Browse</button></span></label>
        </div>
      </fieldset>
      <fieldset>
        <legend>Discovery</legend>
        <div class="grid">
          <label class="full">Model Scan Directories <textarea name="llama.model_scan_dirs" rows="3" spellcheck="false"></textarea></label>
          <label class="full">llama.cpp Directories <textarea name="llama.llama_cpp_dirs" rows="3" spellcheck="false"></textarea></label>
        </div>
        <div class="toolbar compact" aria-label="discovery actions">
          <button type="button" onclick="openPathBrowser('llama.model_scan_dirs', 'directories')">Add Model Folder</button>
          <button type="button" onclick="scanModels()">Scan Models</button>
          <button type="button" onclick="openPathBrowser('llama.llama_cpp_dirs', 'directories')">Add llama.cpp Folder</button>
          <button type="button" onclick="scanLlamaBinaries()">Scan llama.cpp</button>
        </div>
        <div class="grid">
          <label>Detected Models <select id="model-select" onchange="applyModelSelection()"><option value="">Scan to load models</option></select></label>
          <label>Detected llama-server <select id="server-select" onchange="applyServerSelection()"><option value="">Scan to load binaries</option></select></label>
        </div>
      </fieldset>
      <fieldset>
        <legend>Llama Parameters</legend>
        <div class="grid">
          <label>GPU Layers <input name="llama.gpu_layers" type="number"></label>
          <label>Context Size <input name="llama.ctx_size" type="number"></label>
          <label>N Predict <input name="llama.n_predict" type="number"></label>
          <label>Batch Size <input name="llama.batch_size" type="number"></label>
          <label>Parallel <input name="llama.parallel" type="number"></label>
          <label>Flash Attention <input name="llama.flash_attn" autocomplete="off"></label>
          <label>Cache K Type <input name="llama.cache_k_type" autocomplete="off"></label>
          <label>Cache V Type <input name="llama.cache_v_type" autocomplete="off"></label>
          <label>Temperature <input name="llama.temp" autocomplete="off"></label>
          <label>Top P <input name="llama.top_p" autocomplete="off"></label>
          <label>Top K <input name="llama.top_k" autocomplete="off"></label>
          <label>Reasoning <input name="llama.reasoning" autocomplete="off"></label>
          <label>Reasoning Format <input name="llama.reasoning_format" autocomplete="off"></label>
          <label>Reasoning Budget <input name="llama.reasoning_budget" autocomplete="off"></label>
        </div>
      </fieldset>
      <div class="message" id="message" role="status"></div>
    </form>
    <section class="browser" id="path-browser" hidden>
      <div class="browser-head">
        <div>
          <div class="browser-title">Local Path Browser</div>
          <div class="browser-path" id="browser-target"></div>
        </div>
        <button type="button" onclick="closePathBrowser()">Close</button>
      </div>
      <div class="browser-actions">
        <button type="button" id="browser-parent">Up</button>
        <button type="button" id="browser-use-current">Use Current Folder</button>
      </div>
      <div class="browser-path" id="browser-path"></div>
      <div class="browser-list" id="browser-entries"></div>
    </section>
  </main>
  <script>
    const numericFields = new Set([
      "runtime.proxy_port", "runtime.llama_port", "llama.gpu_layers",
      "llama.ctx_size", "llama.n_predict", "llama.batch_size", "llama.parallel"
    ]);
    const arrayFields = new Set(["llama.model_scan_dirs", "llama.llama_cpp_dirs"]);
    const $ = (selector) => document.querySelector(selector);
    let browserTarget = null;
    const setMessage = (text, cls = "") => {
      const el = $("#message");
      el.className = `message ${cls}`;
      el.textContent = text;
    };
    const getPath = (obj, path) => path.split(".").reduce((cur, key) => cur ? cur[key] : undefined, obj);
    const setPath = (obj, path, value) => {
      const parts = path.split(".");
      let cur = obj;
      for (const part of parts.slice(0, -1)) cur = cur[part] ||= {};
      cur[parts.at(-1)] = value;
    };
    const parseList = (value) => value.split(/\r?\n/).map(item => item.trim()).filter(Boolean);
    const fieldFor = (name) => document.querySelector(`[name="${name}"]`);
    const formatBytes = (bytes) => {
      if (!Number.isFinite(bytes)) return "";
      if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
      return `${(bytes / 1024 / 1024 / 1024).toFixed(2)} GB`;
    };
    async function refreshAll() {
      const [health, config] = await Promise.all([
        fetch("/healthz").then(r => r.json()),
        fetch("/api/control/config").then(r => r.json())
      ]);
      $("#status").innerHTML = [
        ["Proxy", health.proxy],
        ["Llama", health.llama_status],
        ["Proxy PID", health.pids?.proxy ?? ""],
        ["Llama PID", health.pids?.llama ?? ""],
        ["Model", config.llama?.model_path ?? ""],
        ["Config", config.config_path ?? ""]
      ].map(([k, v]) => `<div class="metric"><b>${k}</b><span>${String(v)}</span></div>`).join("");
      for (const input of document.querySelectorAll("[name]")) {
        const value = getPath(config, input.name);
        input.value = arrayFields.has(input.name) && Array.isArray(value) ? value.join("\n") : value ?? "";
      }
      setMessage("Loaded", "ok");
    }
    async function saveConfig(options = {}) {
      const payload = {};
      for (const input of document.querySelectorAll("[name]")) {
        let value = input.value;
        if (arrayFields.has(input.name)) value = parseList(value);
        else if (numericFields.has(input.name)) value = Number(value);
        setPath(payload, input.name, value);
      }
      const response = await fetch("/api/control/config", {
        method: "PUT",
        headers: {"content-type": "application/json"},
        body: JSON.stringify(payload)
      });
      if (!response.ok) {
        setMessage(await response.text(), "err");
        throw new Error("Save failed");
      }
      const data = await response.json();
      if (!options.silent) setMessage("Saved", "ok");
      return data;
    }
    async function scanModels() {
      await saveConfig({silent: true});
      const payload = await fetch("/api/control/models").then(r => r.json());
      const select = $("#model-select");
      select.innerHTML = "";
      if (!payload.models?.length) {
        select.append(new Option("No models found", ""));
        setMessage("No .gguf models found in configured directories", "err");
        return;
      }
      for (const model of payload.models) {
        const option = new Option(`${model.name} (${formatBytes(model.size_bytes)})`, model.path);
        option.dataset.mmprojPath = model.mmproj_path || "";
        select.append(option);
      }
      setMessage(`Found ${payload.models.length} model(s)`, "ok");
    }
    function applyModelSelection() {
      const option = $("#model-select").selectedOptions[0];
      if (!option?.value) return;
      fieldFor("llama.model_path").value = option.value;
      if (option.dataset.mmprojPath) fieldFor("llama.mmproj_path").value = option.dataset.mmprojPath;
      setMessage("Model selected", "ok");
    }
    async function scanLlamaBinaries() {
      await saveConfig({silent: true});
      const payload = await fetch("/api/control/llama-binaries").then(r => r.json());
      const select = $("#server-select");
      select.innerHTML = "";
      if (!payload.binaries?.length) {
        select.append(new Option("No llama-server binaries found", ""));
        setMessage("No llama-server binary found in configured directories", "err");
        return;
      }
      for (const binary of payload.binaries) {
        select.append(new Option(`${binary.name} (${binary.directory})`, binary.path));
      }
      setMessage(`Found ${payload.binaries.length} llama-server result(s)`, "ok");
    }
    function applyServerSelection() {
      const value = $("#server-select").value;
      if (!value) return;
      fieldFor("llama.server_bin").value = value;
      setMessage("Server binary selected", "ok");
    }
    async function openPathBrowser(fieldName, filter) {
      browserTarget = {fieldName, filter};
      $("#path-browser").hidden = false;
      $("#browser-target").textContent = fieldName;
      $("#browser-use-current").hidden = !arrayFields.has(fieldName);
      const field = fieldFor(fieldName);
      const current = arrayFields.has(fieldName) ? parseList(field.value)[0] : field.value;
      await loadBrowserPath(current || "", filter);
    }
    function closePathBrowser() {
      $("#path-browser").hidden = true;
      browserTarget = null;
    }
    async function loadBrowserPath(path, filter = browserTarget?.filter || "all") {
      const params = new URLSearchParams({filter});
      if (path) params.set("path", path);
      const response = await fetch(`/api/control/browse?${params.toString()}`);
      if (!response.ok) {
        setMessage(await response.text(), "err");
        return;
      }
      const payload = await response.json();
      $("#browser-path").textContent = payload.path;
      const parentButton = $("#browser-parent");
      parentButton.disabled = !payload.parent;
      parentButton.onclick = () => payload.parent && loadBrowserPath(payload.parent, filter);
      $("#browser-use-current").onclick = () => selectBrowserPath(payload.path);
      renderBrowserEntries(payload.entries || [], filter);
    }
    function renderBrowserEntries(entries, filter) {
      const list = $("#browser-entries");
      list.innerHTML = "";
      if (!entries.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No matching entries";
        list.append(empty);
        return;
      }
      for (const entry of entries) {
        const row = document.createElement("div");
        row.className = "browser-entry";
        const label = document.createElement("span");
        label.textContent = `${entry.type === "directory" ? "[dir]" : "[file]"} ${entry.name}`;
        const action = document.createElement("button");
        action.type = "button";
        action.textContent = entry.type === "directory" ? "Open" : "Select";
        action.onclick = () => entry.type === "directory"
          ? loadBrowserPath(entry.path, filter)
          : selectBrowserPath(entry.path);
        row.append(label, action);
        list.append(row);
      }
    }
    function selectBrowserPath(path) {
      const field = fieldFor(browserTarget.fieldName);
      if (arrayFields.has(browserTarget.fieldName)) {
        const values = parseList(field.value);
        if (!values.includes(path)) values.push(path);
        field.value = values.join("\n");
      } else {
        field.value = path;
      }
      setMessage("Path selected", "ok");
    }
    async function restartRuntime() {
      await fetch("/api/control/restart", {method: "POST"});
      setMessage("Restarting", "ok");
    }
    async function stopRuntime() {
      await fetch("/api/control/stop", {method: "POST"});
      setMessage("Stopping", "ok");
    }
    refreshAll().catch(error => setMessage(String(error), "err"));
  </script>
</body>
</html>
